version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: govtrace
      POSTGRES_PASSWORD: govtrace
      POSTGRES_DB: govtrace
    # CRITICAL: use expose: not ports: to prevent Docker DNAT from bypassing Hetzner firewall (D-10)
    # For local dev, use: docker exec govtrace-postgres-1 psql -U govtrace govtrace
    # OR use: docker compose exec postgres psql -U govtrace govtrace
    # To access from host for dev tools (drizzle studio), use localhost:5432 via the ports below
    # In production Coolify deployment: change ports: to expose: for security
    ports:
      - "127.0.0.1:5432:5432"  # Local dev: bind to 127.0.0.1 only (not 0.0.0.0)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govtrace -d govtrace"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: packages/ingestion/Dockerfile
    environment:
      DATABASE_URL: postgres://govtrace:govtrace@postgres:5432/govtrace
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - ingestion  # Only start with: docker compose --profile ingestion up

volumes:
  postgres_data:
