name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (web)
        run: pnpm --filter @govtrace/web exec tsc --noEmit
        continue-on-error: true

      - name: Build (web)
        run: pnpm --filter @govtrace/web exec vite build

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build PostgreSQL image
        run: |
          docker build -t govtrace-postgres:ci -f - . <<'DOCKERFILE'
          FROM postgres:16-alpine
          COPY docker/postgres-init.sql /docker-entrypoint-initdb.d/01-extensions.sql
          DOCKERFILE

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t govtrace-web:ci .

      - name: Build Ingestion image
        run: docker build -f apps/ingestion/Dockerfile -t govtrace-ingestion:ci .

      - name: Start all containers
        run: |
          docker network create govtrace-ci

          docker run -d --name ci-postgres --network govtrace-ci \
            -e POSTGRES_USER=ci_test -e POSTGRES_PASSWORD=ci_test -e POSTGRES_DB=govtrace_ci \
            --health-cmd "pg_isready -U ci_test -d govtrace_ci" \
            --health-interval 5s --health-timeout 3s --health-retries 10 \
            govtrace-postgres:ci

          # Wait for postgres healthy
          for i in $(seq 1 30); do
            if docker inspect ci-postgres --format '{{.State.Health.Status}}' | grep -q healthy; then
              echo "Postgres healthy"
              break
            fi
            sleep 2
          done

          docker run -d --name ci-web --network govtrace-ci \
            -e DATABASE_URL=postgres://ci_test:ci_test@ci-postgres:5432/govtrace_ci \
            -e NODE_ENV=production -e PORT=3000 \
            govtrace-web:ci

          docker run -d --name ci-ingestion --network govtrace-ci \
            -e DATABASE_URL=postgres://ci_test:ci_test@ci-postgres:5432/govtrace_ci \
            govtrace-ingestion:ci

      - name: Verify web server responds
        run: |
          sleep 10
          docker exec ci-web wget -qO- --timeout=15 http://localhost:3000/how-it-works || (docker logs ci-web && exit 1)

      - name: Verify all containers running
        run: |
          docker ps --format '{{.Names}}\t{{.Status}}'
          echo "---"
          docker inspect ci-postgres --format '{{.State.Health.Status}}'
          docker inspect ci-web --format '{{.State.Status}}'
          docker inspect ci-ingestion --format '{{.State.Status}}'

      - name: Cleanup
        if: always()
        run: |
          docker stop ci-postgres ci-web ci-ingestion 2>/dev/null || true
          docker rm ci-postgres ci-web ci-ingestion 2>/dev/null || true
          docker network rm govtrace-ci 2>/dev/null || true
