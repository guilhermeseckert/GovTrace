name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CI_DB_USER: ci_govtrace
  CI_DB_PASS: ${{ github.run_id }}_${{ github.run_attempt }}
  CI_DB_NAME: govtrace_ci

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ env.CI_DB_PASS }}
          POSTGRES_DB: ${{ env.CI_DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_govtrace -d govtrace_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enable pg_trgm extension
        run: |
          PGPASSWORD=${{ env.CI_DB_PASS }} psql -h localhost -U ${{ env.CI_DB_USER }} -d ${{ env.CI_DB_NAME }} -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Type check (web)
        run: pnpm --filter @govtrace/web exec tsc --noEmit
        continue-on-error: true

      - name: Build (web)
        run: pnpm --filter @govtrace/web exec vite build

      - name: Build Docker image (web)
        run: docker build -f apps/web/Dockerfile -t govtrace-web:ci .

      - name: Build Docker image (ingestion)
        run: docker build -f apps/ingestion/Dockerfile -t govtrace-ingestion:ci .
