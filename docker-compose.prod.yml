# GovTrace Production Docker Compose
# DB is managed by Coolify on the Hetzner host (external postgres container).
# DATABASE_URL + ANTHROPIC_API_KEY are injected by Coolify at deploy time.

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.govtrace.rule=Host(`govtrace.ca`) || Host(`www.govtrace.ca`) || Host(`govtrace.lab.guilhermeseckert.dev`)
      - traefik.http.routers.govtrace.entrypoints=https
      - traefik.http.routers.govtrace.tls=true
      - traefik.http.routers.govtrace.tls.certresolver=letsencrypt
      - traefik.http.services.govtrace.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "--timeout=5", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: production
    networks:
      - default
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
